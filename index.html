<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 단어왕 암기</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #7c4dff; --success: #00c853; --danger: #ff5252; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .game-container { width: 95%; max-width: 500px; background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .screen { display: none; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        .stage-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 20px 0; width: 100%; max-height: 300px; overflow-y: auto; }
        .stage-btn { aspect-ratio: 1; border: none; border-radius: 12px; background: #333; color: #777; font-weight: bold; cursor: not-allowed; transition: 0.2s; }
        .stage-btn.unlocked { background: var(--primary); color: white; cursor: pointer; }
        .stage-btn.cleared { background: var(--success); color: white; cursor: pointer; }
        .target-word { font-size: 28px; font-weight: 800; margin: 20px 0; min-height: 60px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
        input { width: 100%; padding: 15px; border: 2px solid #444; border-radius: 12px; background: #2a2a2a; color: white; font-size: 18px; text-align: center; outline: none; box-sizing: border-box; }
        .feedback-msg { margin: 10px 0; font-weight: bold; font-size: 18px; height: 24px; }
        .error-box { margin-top: 15px; padding: 15px; border-radius: 12px; background: rgba(255, 82, 82, 0.15); border: 1px solid var(--danger); text-align: left; width: 100%; box-sizing: border-box; display: none; }
        .ex-en { font-style: italic; color: #ff8a80; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .ex-ko { color: #ccc; font-size: 13px; line-height: 1.4; }
        .action-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; color: white; }
        .home-link { margin-top: 15px; color: #888; text-decoration: underline; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="game-container">
        <div id="screen-start" class="screen active">
            <h2>2026 단어왕 👑 (오류 있으면 제보좀)</h2>
            <div class="stage-grid" id="stage-grid"></div>
        </div>

        <div id="screen-quiz" class="screen">
            <div style="font-size: 13px; color: #888;">STAGE <span id="stg-num"></span> | <span id="wrd-idx"></span>/5</div>
            <div class="target-word" id="display-word"></div>
            <input type="text" id="user-input" placeholder="정답 입력" autocomplete="off">
            <div id="feedback" class="feedback-msg"></div>
            <div id="error-box" class="error-box">
                <div style="color: var(--danger); font-weight: bold; margin-bottom: 5px;">❌ 오답! 정답: <span id="correct-ans"></span></div>
                <div class="ex-en" id="ex-en"></div>
                <div class="ex-ko" id="ex-ko"></div>
                <div id="wait-msg" style="margin-top: 10px; font-size: 11px; color: #ffab91;">예문 읽는 중...</div>
            </div>
        </div>

        <div id="screen-result" class="screen">
            <h2 id="res-title"></h2>
            <p id="res-desc"></p>
            <button id="res-next-btn" class="action-btn" onclick="nextAction()"></button>
            <div class="home-link" onclick="goHome()">스테이지 목록으로</div>
        </div>
    </div>

        let unlocked = 1, cleared = new Set(), currentStg = 0, idx = 0, score = 0;
        let isErrorMode = false, canProceed = false, activeScreen = 'start';
        let currentShuffledWords = []; // 현재 섞인 단어 목록

        // 섞기 알고리즘 (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (activeScreen === 'quiz') {
                    if (isErrorMode) { if (canProceed) { idx++; nextWord(); } }
                    else { checkAns(); }
                } else if (activeScreen === 'result') { nextAction(); }
            }
        });

        function speak(text) {
            window.speechSynthesis.cancel(); // 이전 음성 중단
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // 브라우저에서 사용 가능한 목소리 목록 가져오기
            const voices = window.speechSynthesis.getVoices();
            
            // 영어를 사용하는 목소리 중 'Google'이 들어간 자연스러운 목소리 찾기
            // 만약 없으면 그냥 첫 번째 영어 목소리 선택
            const preferredVoice = voices.find(v => v.lang.includes('en') && v.name.includes('Google')) 
                                   || voices.find(v => v.lang.includes('en'));
            
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }
        
            utterance.lang = 'en-US'; 
            utterance.rate = 0.9; // 속도를 0.9 정도로 하면 좀 더 사람 같습니다.
            utterance.pitch = 1.0; // 음높이 (너무 높으면 닭 소리처럼 들리니 1.0 유지)
            
            window.speechSynthesis.speak(utterance);
        }
        
        // 크롬에서 목소리 목록을 비동기로 로드하기 때문에 필요한 코드
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };

        function renderStages() {
            const grid = document.getElementById('stage-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 30; i++) {
                const btn = document.createElement('button');
                btn.className = `stage-btn ${cleared.has(i) ? 'cleared' : (i <= unlocked ? 'unlocked' : '')}`;
                btn.innerText = i;
                if (i <= unlocked) btn.onclick = () => startStage(i);
                grid.appendChild(btn);
            }
        }

        function startStage(num) {
            currentStg = num; idx = 0; score = 0; isErrorMode = false;
            // 해당 스테이지 단어 5개 복사 후 셔플
            const originalWords = wordData.slice((num - 1) * 5, (num - 1) * 5 + 5);
            currentShuffledWords = shuffle([...originalWords]); 
            
            showScreen('quiz');
            document.getElementById('stg-num').innerText = num;
            nextWord();
        }

        function nextWord() {
            if (idx >= 5) { showResult(); return; }
            isErrorMode = false;
            canProceed = false;
            
            const word = currentShuffledWords[idx];
            document.getElementById('display-word').innerText = word.en;

            speak(word.en);
    
            document.getElementById('wrd-idx').innerText = idx + 1;
            const input = document.getElementById('user-input');
            input.value = ''; input.readOnly = false;
            document.getElementById('feedback').innerText = '';
            document.getElementById('error-box').style.display = 'none';
            input.focus();
}

        function checkAns() {
            const input = document.getElementById('user-input');
            const word = currentShuffledWords[idx];
            const userVal = input.value.trim().toLowerCase();
            const correct = word.ko.toLowerCase().replace('~', '').trim();

            if (userVal === correct || userVal === word.ko.toLowerCase()) {
                score++;
                document.getElementById('feedback').innerText = "✅ 정답!";
                document.getElementById('feedback').style.color = "var(--success)";
                input.readOnly = true;
                
                // [수정] 여기서는 speak를 빼버립니다! 
                // 0.6초 뒤에 실행될 nextWord() 안에서 어차피 소리가 날 테니까요.
                setTimeout(() => { 
                    idx++; 
                    nextWord(); 
                }, 600);
            } else {
                // [추가] 틀렸을 때는 다음 단어로 안 넘어가니까 여기서 소리를 들려줍니다.
                speak(word.en);
                
                isErrorMode = true; 
                input.readOnly = true;
                document.getElementById('error-box').style.display = 'block';
                document.getElementById('correct-ans').innerText = word.ko;
                document.getElementById('ex-en').innerText = word.exEn;
                document.getElementById('ex-ko').innerText = "해석: " + word.exKo;
                
                setTimeout(() => { 
                    canProceed = true; 
                    document.getElementById('wait-msg').innerText = "[엔터] 눌러서 다음 단어";
                    document.getElementById('wait-msg').style.color = "#00c853";
                }, 1000);
            }
        }

        function showResult() {
            showScreen('result');
            const nextBtn = document.getElementById('res-next-btn');
            if (score === 5) {
                document.getElementById('res-title').innerText = "STAGE CLEAR! 🎉";
                document.getElementById('res-title').style.color = "var(--success)";
                document.getElementById('res-desc').innerText = "완벽하게 외우셨네요!";
                nextBtn.innerText = "다음 스테이지 시작 (Enter)";
                nextBtn.style.background = "var(--success)";
                cleared.add(currentStg);
                if (currentStg === unlocked && unlocked < 30) unlocked++;
            } else {
                document.getElementById('res-title').innerText = "FAILED ⛈️";
                document.getElementById('res-title').style.color = "var(--danger)";
                document.getElementById('res-desc').innerText = "순서가 바뀌어도 맞힐 수 있어야 진짜 실력!";
                nextBtn.innerText = "다시 도전하기 (Enter)";
                nextBtn.style.background = "var(--primary)";
            }
        }

        function nextAction() {
            if (score === 5) {
                if (currentStg < 30) startStage(currentStg + 1);
                else goHome();
            } else {
                startStage(currentStg);
            }
        }

        function showScreen(type) {
            activeScreen = type;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + type).classList.add('active');
        }

        function goHome() { renderStages(); showScreen('start'); }
        renderStages();
    </script>
</body>
</html>
